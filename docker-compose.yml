services:
  # ==========================================
  # PostgreSQL - Base de données principale
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: if-festival-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: festival_db
      POSTGRES_USER: festival
      POSTGRES_PASSWORD: festival_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U festival -d festival_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ==========================================
  # Redis - Cache & Rate Limiting
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: if-festival-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==========================================
  # Backend Go (optionnel en dev - on peut run localement)
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: if-festival-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://festival:festival_secret@postgres:5432/festival_db?sslmode=disable
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
