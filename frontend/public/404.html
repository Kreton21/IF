<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — L'Interfilières 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --rose:      #F97FA0;
  --peach:     #FF9B6A;
  --night:     #1E0845;
  --purple:    #7B3FA8;
  --lavender:  #C9B8FF;
  --offwhite:  #FBF7FF;
  --text:      #220850;
  --muted:     #9B8AB4;
}
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Montserrat',sans-serif;
  color:var(--text);
  background:var(--offwhite);
  min-height:100vh;
  overflow:hidden;
}
.top-bar {
  background:linear-gradient(135deg, var(--night) 0%, var(--purple) 100%);
  padding:18px 5vw;
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.top-logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:1.75rem;
  letter-spacing:3px;
  background:linear-gradient(135deg,var(--rose),var(--peach));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  text-decoration:none;
}
.top-back {
  color:rgba(255,255,255,.8);
  font-size:.85rem;
  font-weight:600;
  text-decoration:none;
  transition:color .2s;
}
.top-back:hover { color:#fff; }

.container {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:calc(100vh - 62px);
  text-align:center;
  padding:40px 20px;
  position:relative;
}

/* Floating notes decoration */
.notes {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  overflow:hidden;
  pointer-events:none;
}
.note {
  position:absolute;
  font-size:2rem;
  opacity:.08;
  animation:float linear infinite;
}
@keyframes float {
  0% { transform:translateY(100vh) rotate(0); opacity:0; }
  10% { opacity:.08; }
  90% { opacity:.08; }
  100% { transform:translateY(-10vh) rotate(360deg); opacity:0; }
}

.big-404 {
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(8rem, 20vw, 14rem);
  font-weight:400;
  line-height:1;
  background:linear-gradient(135deg, var(--rose), var(--peach), var(--lavender));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:8px;
  letter-spacing:8px;
  animation: glow 3s ease-in-out infinite alternate;
}
@keyframes glow {
  0% { filter:brightness(1); }
  100% { filter:brightness(1.15); }
}

h1 {
  font-size:1.4rem;
  font-weight:800;
  color:var(--text);
  margin-bottom:12px;
}

.subtitle {
  color:var(--muted);
  font-size:.95rem;
  line-height:1.6;
  margin-bottom:36px;
  max-width:400px;
}

.btn-home {
  display:inline-block;
  background:linear-gradient(135deg, var(--rose), var(--peach));
  color:#fff;
  font-size:.9rem;
  font-weight:700;
  padding:14px 36px;
  border-radius:50px;
  text-decoration:none;
  transition:transform .2s, box-shadow .2s;
  box-shadow:0 4px 18px rgba(249,127,160,.35);
}
.btn-home:hover {
  transform:translateY(-2px);
  box-shadow:0 8px 28px rgba(249,127,160,.5);
}

@media (max-width:480px) {
  h1 { font-size:1.2rem; }
}
</style>
</head>
<body>

<div class="top-bar">
  <a href="/" class="top-logo">L'INTERFILIÈRES</a>
  <a href="/" class="top-back">← Retour à l'accueil</a>
</div>

<div class="container">
  <!-- Floating music notes -->
  <div class="notes" id="notes"></div>

  <div class="big-404">404</div>
  <h1>Page introuvable</h1>
  <p class="subtitle">Cette page n'existe pas ou a été déplacée.<br>Pas de panique, le festival est toujours là ! 🎵</p>
  <a href="/" class="btn-home">🏠 Retour à l'accueil</a>
</div>

<script>
// Generate floating music notes
const symbols = ['♪', '♫', '♬', '🎵', '🎶', '🎸', '🎤', '🥁'];
const container = document.getElementById('notes');
for (let i = 0; i < 15; i++) {
  const note = document.createElement('div');
  note.className = 'note';
  note.textContent = symbols[Math.floor(Math.random() * symbols.length)];
  note.style.left = Math.random() * 100 + '%';
  note.style.animationDuration = (8 + Math.random() * 12) + 's';
  note.style.animationDelay = (Math.random() * 10) + 's';
  note.style.fontSize = (1.2 + Math.random() * 2.5) + 'rem';
  container.appendChild(note);
}
</script>

</body>
</html>
